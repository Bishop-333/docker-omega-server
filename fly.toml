# fly.toml app configuration file generated for omega-server on 2026-04-25T13:02:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'omega-server'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 27960
  protocol = "udp"
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services.ports]]
  port = 27960

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
